<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0D0D0D">
  <title>Photo Slideshow | Cowboy Disco Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="/assets/brand-mark.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/app-icon.png">
</head>
<body class="slideshow-page">
  <a class="skip-link" href="#main">Skip to slideshow</a>
  <main id="main" class="slideshow">
    <div class="slideshow__stage" id="slideshow-stage">
      <p class="slideshow__empty" id="slideshow-empty">Photos will appear here as guests upload to the gallery.</p>
      <img class="slideshow__image is-hidden" id="slideshow-image" alt="">
      <video class="slideshow__video is-hidden" id="slideshow-video" playsinline muted controls></video>
      <div class="slideshow__caption is-hidden" id="slideshow-caption"></div>
    </div>
    <div class="slideshow__hud no-print">
      <p class="slideshow__brand">Cowboy Disco Party · Photo Slideshow</p>
      <p class="slideshow__status" id="slideshow-status">Loading photos…</p>
      <div class="slideshow__controls">
        <button class="btn btn--secondary" type="button" id="slideshow-prev" aria-label="Previous photo">←</button>
        <button class="btn btn--secondary" type="button" id="slideshow-pause" aria-pressed="false">Pause</button>
        <button class="btn btn--secondary" type="button" id="slideshow-next" aria-label="Next photo">→</button>
        <a class="btn btn--secondary" href="index.html">Home</a>
        <a class="btn btn--secondary" href="gallery.html">Gallery</a>
      </div>
    </div>
  </main>

  <script src="js/slideshow.js"></script>
  <script src="js/premium.js"></script>
</body>
</html>
