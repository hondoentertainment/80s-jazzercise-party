<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Printable QR code for the Cowboy Disco Party website — scan for games, photos, and party info.">
  <meta name="theme-color" content="#e8b923">
  <title>Print QR Code | Cowboy Disco Party</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230d0d1a' width='100' height='100' rx='16'/><circle cx='50' cy='36' r='22' fill='%23a8b2bc' stroke='%23e8b923' stroke-width='2'/><circle cx='42' cy='30' r='5' fill='%23fff' opacity='.75'/><text y='84' x='50' text-anchor='middle' font-size='24'>🤠</text></svg>">
</head>
<body class="qr-print-page">
  <main id="main" class="qr-print" data-qr-block>
    <div class="qr-print__sheet">
      <div class="brand-lockup brand-lockup--card" style="justify-content: center; margin-bottom: 1rem;">
        <img class="brand-lockup__mark" src="/assets/brand-mark.svg" width="48" height="48" alt="">
        <span class="brand-lockup__text">
          <span class="brand-lockup__name">Cowboy Disco Party</span>
          <span class="brand-lockup__sub">Cowboy Disco Saloon</span>
        </span>
      </div>
      <h1 class="qr-print__title">Scan to Join the Party</h1>
      <p class="qr-print__subtitle">Ice Breakers · Photos · FAQ · Enter on the Woodlawn side</p>
      <div class="qr-print__frame qr-block__frame">
        <img
          class="qr-block__img qr-print__img"
          src="/assets/qr-code.png"
          width="320"
          height="320"
          alt="QR code for the Cowboy Disco Party website"
        >
        <canvas class="qr-block__canvas is-hidden" data-size="320" width="320" height="320" aria-hidden="true"></canvas>
      </div>
      <p class="qr-print__url qr-block__url"></p>
      <p class="qr-print__date">Aug 15, 2026 · 6:30 PM</p>
    </div>

    <div class="qr-print__actions no-print">
      <button class="btn btn--primary" type="button" onclick="window.print()">Print Sign</button>
      <a class="btn btn--secondary" href="/assets/qr-code.png" download="cowboy-disco-party-qr.png">Download PNG</a>
      <button class="btn btn--secondary qr-block__copy" type="button">Copy link</button>
      <a class="btn btn--secondary" href="index.html">Back to Site</a>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/qr.js"></script>
</body>
</html>
