<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Printable venue signs for the Cowboy Disco Party — Woodlawn entrance, apartment banner, and food labels.">
  <meta name="theme-color" content="#e8b923">
  <title>Print Signs | Cowboy Disco Party</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230d0d1a' width='100' height='100' rx='16'/><circle cx='50' cy='36' r='22' fill='%23a8b2bc' stroke='%23e8b923' stroke-width='2'/><circle cx='42' cy='30' r='5' fill='%23fff' opacity='.75'/><text y='84' x='50' text-anchor='middle' font-size='24'>🤠</text></svg>">
</head>
<body class="signs-print-page">
  <main id="main" class="signs-print">
    <header class="signs-print__intro no-print">
      <h1>Printable Party Signs</h1>
      <p>Print these for the Woodlawn entrance, apartment hallway, and food table.</p>
      <div class="signs-print__actions">
        <button class="btn btn--primary" type="button" onclick="window.print()">Print All Signs</button>
        <a class="btn btn--secondary" href="index.html">Back to Site</a>
      </div>
    </header>

    <section class="signs-print__sheet" id="woodlawn">
      <p class="signs-print__label">Woodlawn Entrance</p>
      <picture>
        <source srcset="/assets/sign-woodlawn-entrance.webp" type="image/webp">
        <img
          class="signs-print__img"
          src="/assets/sign-woodlawn-entrance.jpg"
          alt="Woodlawn entrance sign with buzz-in instructions for K. Henderson, apartment 327"
        >
      </picture>
    </section>

    <section class="signs-print__sheet" id="apartment">
      <p class="signs-print__label">Apartment 327</p>
      <picture>
        <source srcset="/assets/sign-kyles-apartment.webp" type="image/webp">
        <img
          class="signs-print__img"
          src="/assets/sign-kyles-apartment.jpg"
          alt="Cowboy Disco Saloon sign for apartment 327"
        >
      </picture>
    </section>

    <section class="signs-print__sheet" id="food-labels">
      <p class="signs-print__label">Food Labels</p>
      <picture>
        <source srcset="/assets/food-labels-sheet.webp" type="image/webp">
        <img
          class="signs-print__img"
          src="/assets/food-labels-sheet.jpg"
          alt="Printable Saloon fuel food label sheet with ten business-card tags"
        >
      </picture>
    </section>

    <section class="signs-print__sheet" id="poster">
      <p class="signs-print__label">Party Poster</p>
      <picture>
        <source srcset="/assets/poster.webp" type="image/webp">
        <img
          class="signs-print__img"
          src="/assets/poster-hero.jpg"
          alt="Cowboy Disco Party poster with enter on Woodlawn arrow"
        >
      </picture>
    </section>
  </main>
</body>
</html>
