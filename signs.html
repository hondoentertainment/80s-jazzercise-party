<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Printable venue signs for the Cowboy Disco Party — entrance sign, saloon door sign, and food labels.">
  <meta name="theme-color" content="#0D0D0D">
  <title>Print Signs | Cowboy Disco Party</title>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/premium.css">
  <link rel="icon" href="/assets/brand-mark.svg" type="image/svg+xml">
</head>
<body class="signs-print-page">
  <main id="main" class="signs-print">
    <header class="signs-print__intro no-print">
      <h1>Printable Party Signs</h1>
      <p>Print these for the entrance, the saloon door, and the food table.</p>
      <div class="signs-print__actions">
        <button class="btn btn--primary" type="button" onclick="window.print()">Print All Signs</button>
        <a class="btn btn--secondary" href="index.html">Back to Site</a>
      </div>
    </header>

    <section class="signs-print__sheet" id="entrance">
      <p class="signs-print__label">Entrance</p>
      <picture>
        <source srcset="/assets/sign-entrance.webp" type="image/webp">
        <img
          class="signs-print__img"
          src="/assets/sign-entrance.jpg"
          alt="Cowboy Disco Party entrance sign — 420 NE 72nd St, Seattle"
        >
      </picture>
    </section>

    <section class="signs-print__sheet" id="apartment">
      <p class="signs-print__label">Saloon Door</p>
      <picture>
        <source srcset="/assets/sign-kyles-apartment.webp" type="image/webp">
        <img
          class="signs-print__img"
          src="/assets/sign-kyles-apartment.jpg"
          alt="Cowboy Disco Saloon door sign"
        >
      </picture>
    </section>

    <section class="signs-print__sheet" id="food-labels">
      <p class="signs-print__label">Food Labels</p>
      <picture>
        <source srcset="/assets/food-labels-sheet.webp" type="image/webp">
        <img
          class="signs-print__img"
          src="/assets/food-labels-sheet.jpg"
          alt="Printable Saloon fuel food label sheet with ten business-card tags"
        >
      </picture>
    </section>

    <section class="signs-print__sheet" id="poster">
      <p class="signs-print__label">Party Poster</p>
      <picture>
        <source srcset="/assets/poster.webp" type="image/webp">
        <img
          class="signs-print__img"
          src="/assets/poster-hero.jpg"
          alt="Cowboy Disco Party poster"
        >
      </picture>
    </section>
  </main>
</body>
</html>
