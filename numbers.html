<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0D0D0D">
  <title>Print Contestant Numbers | Cowboy Disco Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/premium.css">
  <link rel="icon" href="/assets/brand-mark.svg" type="image/svg+xml">
</head>
<body class="numbers-print-page">
  <main id="main" class="numbers-print">
    <div class="numbers-print__sheet" id="numbers-sheet">
      <header class="numbers-print__header">
        <p class="numbers-print__eyebrow">Cowboy Disco Party</p>
        <h1 class="numbers-print__title">Best Outfit Numbers</h1>
        <p class="numbers-print__subtitle">Wear your number — guests vote by contestant # before 9 PM</p>
      </header>
      <div class="numbers-print__grid" id="numbers-grid" aria-label="Contestant number tags"></div>
    </div>

    <div class="numbers-print__actions no-print">
      <div class="form-row numbers-print__count">
        <label for="numbers-count">How many tags?</label>
        <input type="number" id="numbers-count" min="1" max="99" value="30">
      </div>
      <button class="btn btn--primary" type="button" id="numbers-regenerate">Update Tags</button>
      <button class="btn btn--primary" type="button" onclick="window.print()">Print Tags</button>
      <a class="btn btn--secondary" href="host.html">Host Dashboard</a>
      <a class="btn btn--secondary" href="index.html">Back to Site</a>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/numbers.js"></script>
  <script src="js/premium.js"></script>
</body>
</html>
