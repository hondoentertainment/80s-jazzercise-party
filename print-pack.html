<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#e8b923">
  <title>Print Pack | Cowboy Disco Party</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230d0d1a' width='100' height='100' rx='16'/><circle cx='50' cy='36' r='22' fill='%23a8b2bc' stroke='%23e8b923' stroke-width='2'/><circle cx='42' cy='30' r='5' fill='%23fff' opacity='.75'/><text y='84' x='50' text-anchor='middle' font-size='24'>🤠</text></svg>">
</head>
<body class="signs-print-page">
  <main id="main" class="signs-print">
    <header class="signs-print__intro no-print">
      <h1>Print Pack</h1>
      <p>Everything to print before party night — open each section or print this page.</p>
      <div class="signs-print__actions">
        <button class="btn btn--primary" type="button" onclick="window.print()">Print All</button>
        <a class="btn btn--secondary" href="party-night.html">Party Night Setup</a>
        <a class="btn btn--secondary" href="host.html">Host Dashboard</a>
      </div>
    </header>

    <section class="signs-print__sheet">
      <p class="signs-print__label">QR Sign</p>
      <p>Open <a href="qr.html">qr.html</a> for the full-size QR print layout.</p>
      <img class="signs-print__img" src="/assets/qr-code.png" alt="QR code for Cowboy Disco Party" width="320" height="320">
    </section>

    <section class="signs-print__sheet">
      <p class="signs-print__label">Woodlawn Entrance</p>
      <picture>
        <source srcset="/assets/sign-woodlawn-entrance.webp" type="image/webp">
        <img class="signs-print__img" src="/assets/sign-woodlawn-entrance.jpg" alt="Woodlawn entrance sign">
      </picture>
    </section>

    <section class="signs-print__sheet">
      <p class="signs-print__label">Apartment 327</p>
      <picture>
        <source srcset="/assets/sign-kyles-apartment.webp" type="image/webp">
        <img class="signs-print__img" src="/assets/sign-kyles-apartment.jpg" alt="Cowboy Disco Saloon sign">
      </picture>
    </section>

    <section class="signs-print__sheet">
      <p class="signs-print__label">Food Labels</p>
      <picture>
        <source srcset="/assets/food-labels-sheet.webp" type="image/webp">
        <img class="signs-print__img" src="/assets/food-labels-sheet.jpg" alt="Saloon fuel food labels">
      </picture>
    </section>

    <section class="signs-print__sheet">
      <p class="signs-print__label">Contestant Numbers</p>
      <p>Open <a href="numbers.html">numbers.html</a> to print vote tags 1–30.</p>
    </section>
  </main>
</body>
</html>
